<div class="category-list">
  @for (category of categories(); track category.id) {
  <app-category-card
    [category]="category"
    [showGroupBadge]="showGroupBadge()"
    [selected]="selectedCategory()?.id === category.id"
    (categorySelection)="categorySelection.emit(category)"
  ></app-category-card>
  }
</div>
