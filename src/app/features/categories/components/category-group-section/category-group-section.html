<section class="category-group-section">
  <div
    class="category-group-section__header"
    [style.background-color]="section().groupColor"
  >
    <h2 class="category-group-section__title">
      {{ section().groupName }}
    </h2>
  </div>

  <app-category-list [categories]="section().categories"></app-category-list>
</section>
