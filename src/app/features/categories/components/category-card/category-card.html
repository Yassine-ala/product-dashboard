<div>
  @if (showGroupBadge() && category().group) {
  <div
   class="category-group-badge"
   [style.padding]="'10px'"
   [style.color]="groupColor()"
   [style.background-color]="'color-mix(in srgb, ' + groupColor() + ' 15%, transparent)'">
    {{ category().group?.name }}
  </div>
  }

  <h4>{{ category().wording }}</h4>
  <p>{{ category().description }}</p>
</div>
